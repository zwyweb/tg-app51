// promo utils
const SECRET = 'i';
function encodePromo(payload) {
  const utf8str = encodeURIComponent(JSON.stringify(payload) + '|' + SECRET);
  return btoa(utf8str);
}

function decodePromo(str) {
  try {
    const decoded = decodeURIComponent(atob(str));
    const [json, salt] = decoded.split('|');
    if (salt !== SECRET) throw '';
    return JSON.parse(json);
  } catch {
    return null;
  }
}
