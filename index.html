<script>
/* =========================================================================
 * 1. Простой компрессор общего назначения (LZ77-подобный, как LZ4/LZO)
 *    Формат:
 *      [4 байта LE — исходная длина]
 *      далее токены:
 *        0x00, len(1б), <len байт литералов>
 *        0x01, offset(2б LE), len(1б, реальная длина = len + MIN_MATCH)
 *    Совпадения ищутся через хеш-таблицу 4-байтовых окон (chain до 16),
 *    поэтому сжатие остаётся быстрым даже на изображениях в сотни KB.
 * ========================================================================= */
const LZ = (() => {
  const MIN_MATCH = 4;
  const MAX_MATCH = MIN_MATCH + 255;
  const MAX_OFFSET = 65535;
  const MAX_CHAIN = 16;

  function compress(bytes) {
    const n = bytes.length;
    const out = [];
    out.push(n & 0xFF, (n >>> 8) & 0xFF, (n >>> 16) & 0xFF, (n >>> 24) & 0xFF);

    const hashTable = new Map();
    const hash4 = (p) => ((bytes[p] | (bytes[p + 1] << 8) | (bytes[p + 2] << 16) | (bytes[p + 3] << 24)) >>> 0);
    const insert = (p) => {
      if (p + 4 > n) return;
      const h = hash4(p);
      let arr = hashTable.get(h);
      if (!arr) { arr = []; hashTable.set(h, arr); }
      arr.push(p);
      if (arr.length > MAX_CHAIN) arr.shift();
    };

    let i = 0, literalStart = 0;
    const flushLiterals = (end) => {
      let start = literalStart;
      while (start < end) {
        const len = Math.min(255, end - start);
        out.push(0, len);
        for (let k = 0; k < len; k++) out.push(bytes[start + k]);
        start += len;
      }
    };

    while (i < n) {
      let bestLen = 0, bestOffset = 0;
      if (i + MIN_MATCH <= n) {
        const candidates = hashTable.get(hash4(i));
        if (candidates) {
          for (let ci = candidates.length - 1; ci >= 0; ci--) {
            const j = candidates[ci];
            const offset = i - j;
            if (offset <= 0 || offset > MAX_OFFSET) continue;
            const maxLen = Math.min(MAX_MATCH, n - i);
            let len = 0;
            while (len < maxLen && bytes[j + len] === bytes[i + len]) len++;
            if (len > bestLen) { bestLen = len; bestOffset = offset; }
          }
        }
      }
      if (bestLen >= MIN_MATCH) {
        flushLiterals(i);
        out.push(1, bestOffset & 0xFF, (bestOffset >>> 8) & 0xFF, bestLen - MIN_MATCH);
        const end = i + bestLen;
        for (; i < end; i++) insert(i);
        literalStart = i;
      } else {
        insert(i);
        i++;
      }
    }
    flushLiterals(n);
    return Uint8Array.from(out);
  }

  function decompress(bytes) {
    const n = bytes[0] | (bytes[1] << 8) | (bytes[2] << 16) | (bytes[3] << 24);
    const out = new Uint8Array(n);
    let op = 0, ip = 4;
    while (op < n) {
      const type = bytes[ip++];
      if (type === 0) {
        const len = bytes[ip++];
        for (let k = 0; k < len; k++) out[op++] = bytes[ip++];
      } else {
        const offset = bytes[ip] | (bytes[ip + 1] << 8);
        ip += 2;
        const len = bytes[ip++] + MIN_MATCH;
        let from = op - offset;
        for (let k = 0; k < len; k++) { out[op] = out[from]; op++; from++; }
      }
    }
    return out;
  }

  return { compress, decompress };
})();

/* =========================================================================
 * 2. Удобная обёртка над IndexedDB.
 *    Пользователю (коду приложения) не нужно думать про соединение,
 *    транзакции или сжатие — всё происходит прозрачно внутри .set()/.get().
 * ========================================================================= */
const Store = (() => {
  const DB_NAME = "CatGalleryDB";
  const DB_VERSION = 1;
  const STORE_NAME = "cats";
  let dbPromise = null;

  function db() {
    // соединение открывается один раз и переиспользуется — без рефетчей
    if (!dbPromise) {
      dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
          const d = e.target.result;
          if (!d.objectStoreNames.contains(STORE_NAME)) {
            d.createObjectStore(STORE_NAME, { keyPath: "id", autoIncrement: true });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    return dbPromise;
  }

  async function blobToBytes(blob) {
    return new Uint8Array(await blob.arrayBuffer());
  }

  function pack(raw) {
    const compressed = LZ.compress(raw);
    // если сжатие не дало выигрыша (типично для уже сжатых JPEG/PNG),
    // храним как есть — не тратим время на распаковку впустую
    if (compressed.length < raw.length) return { c: 1, data: compressed };
    return { c: 0, data: raw };
  }

  function unpack(record) {
    return record.c ? LZ.decompress(record.data) : record.data;
  }

  return {
    // добавить карту, сжатие происходит автоматически и мгновенно
    async set(name, rarity, blob) {
      const raw = await blobToBytes(blob);
      const { c, data } = pack(raw);
      const record = { name, rarity, mime: blob.type || "image/png", c, data };
      const d = await db();
      return new Promise((resolve, reject) => {
        const tx = d.transaction(STORE_NAME, "readwrite");
        const req = tx.objectStore(STORE_NAME).add(record);
        req.onsuccess = () => resolve(req.result); // новый id
        req.onerror = () => reject(req.error);
      });
    },
    async delete(id) {
      const d = await db();
      return new Promise((resolve, reject) => {
        const tx = d.transaction(STORE_NAME, "readwrite");
        tx.objectStore(STORE_NAME).delete(id);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    },
    // читается из IndexedDB только один раз при старте — дальше работаем с кэшем
    async getAll() {
      const d = await db();
      const records = await new Promise((resolve, reject) => {
        const tx = d.transaction(STORE_NAME, "readonly");
        const req = tx.objectStore(STORE_NAME).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
      return records.map((r) => ({
        id: r.id,
        name: r.name,
        rarity: r.rarity,
        blob: new Blob([unpack(r)], { type: r.mime }),
      }));
    },
  };
})();

/* =========================================================================

 * ========================================================================= */
const rarityTiers = [

const rarityColors = {
  "Базовая": "linear-gradient(45deg, #673208, #db6c2b)",
  "Обычная": "#d7f2b3",
  "Необычная": "#b3e0ff",

  "Хроматическая": "linear-gradient(45deg, #ffb3ba, #ffdfba, #ffffba, #baffc9, #bae1ff, #d5baff, #ffbaff)",
  "Божественная": "linear-gradient(39deg, #fce055 0%, #4d4dff 87%, #6050dc 100%)",
  "Уникальная": "linear-gradient(25deg, #220430, #571046, #8f1d5e, #cb2b76)",
};

const prefixes = ["Барсик","Зефира","Снежок","Леонид","Сильвестр","Рыжик","Гарри","Феликс","Тигран","Котофей","Шерлок","Фиона","Буба","Каспар","Мистер","Зефир","Лаки","Маркус","Франк","Василий","Милорд","Геннадий","Котяра","Владимир","Мурзик","Эмбер","Патрик","Им","Кузьма","Люциан","Малыш","Тимофей","Агата","Бинго","Фродо","Мурзик","Тимофей","Цезарь","Беня","Злата","Сидор","Леопольд","Рокки","Вениамин","Честер","Гамлет","Чапа","Дорофей","Абрикос","Кефир","Пломбир","Джус","Нарцисс","Кекс","Граф","Лимон","Базилио","Квас","Фауст","Олег","Султан","Трюфель","Пельмень","Эркюль","Флинт","Ладислав"];
const connectors = ["", " аль ", " де ", " фон ", " из ", " ле ", " ла ", " ди ", " ду ", " да ", " ля ", " дер ", " тер ", " и ", " у ", " на ", " при ", " ан ", " эль ", " о' ", " ап ", " фиц ", " ма ", " сан ", " бин ", " ибн", " ван ", " тер-дер ", " ду-ла ", " ла-"];
const suffixes = ["Муров","Шабров","Лапкин","Снежнов","Котов","Хвостов","Пушкин","Леонов","Когтев","Мурманов","Барсов","Мурлыков","Пушистык","Графов","Кошкин","Шерстяков","Тигров","Царапкин","Котоедов","Зубарев","Брысов","Сырников","Чеширов","Усатов","Шерлоков","Бафометов","Тузиков","Ковров","Носов","Ленин","Шуршав","Жевтунов","Медов","Романов","Мимов","Фурров","Огурцов","Персиков","Горшков","Филатов","Шмяков","Пельмешкин","Рыбаков","Гребенников","Труханов","Шумов","Гаврошев","Нюхов","Слепов","Кашастый","Кат","Бастионов","Магриттов","Петушкин","Гуревич","Скубидов","Махнов","Хрусталёв","Хомячков","Пельмяшев","Зюзин","Хлебушкин","Трепачёв","Задиров","Капитанов","Фазанов","Кузин","Ладович"];

function weightedRandomIndex(arr) {
  const t = Math.pow(Math.random(), 2);
  return Math.floor(t * arr.length);
}
function generateCatName() {
  const p = prefixes[weightedRandomIndex(prefixes)];
  const c = connectors[weightedRandomIndex(connectors)];
  const s = suffixes[weightedRandomIndex(suffixes)];
  return `${p} ${c.trim()} ${s}`;
}
function hashNameToNumber(name, mod = 1986) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (31 * h + name.charCodeAt(i)) >>> 0;
  return h % mod;
}
function getRarityInfo(v) {
  return rarityTiers.find((t) => v >= t.min && v <= t.max);
}

/* =========================================================================
 * 4. Кошелёк и статистика — читаются из localStorage один раз в память,
 *    дальше работаем только с кэшем и пишем на диск при изменениях.
 * ========================================================================= */
const WALLET_KEY = "walletValue";
let walletCache = parseInt(localStorage.getItem(WALLET_KEY) || "10000", 10);

function getWallet() { return walletCache; }
function setWallet(v) {
  walletCache = parseInt(v, 10);
  localStorage.setItem(WALLET_KEY, walletCache);
  document.getElementById("currency").textContent = `${walletCache}💰`;
}

const STAT_KEY = "userStats";
let stats = {
  username: "",
  name: "",
  totalCards: 0,
  rarityCount: {},
  sent: { cards: 0, money: 0 },
  received: { cards: 0, money: 0 },
  usedPromo: [],
};
(function loadStats() {
  const data = localStorage.getItem(STAT_KEY);
  if (data) Object.assign(stats, JSON.parse(data));
})();
function saveStats() { localStorage.setItem(STAT_KEY, JSON.stringify(stats)); }

// кэш карточек в памяти — единственный источник правды в течение сессии,
// подгружается из IndexedDB один раз при старте (см. init())
let cardsCache = [];

function recalcCardStatsFromCache() {
  stats.totalCards = cardsCache.length;
  stats.rarityCount = cardsCache.reduce((acc, c) => {
    acc[c.rarity] = (acc[c.rarity] || 0) + 1;
    return acc;
  }, {});
  saveStats();
}
function updateSent(type, amount = 1) { stats.sent[type] += amount; saveStats(); }
function updateReceived(type, amount = 1) { stats.received[type] += amount; saveStats(); }

function renderStats() {
  document.getElementById("stat-username").textContent = `Пользователь: ${stats.username} (${stats.name})`;
  document.getElementById("stat-total-cards").textContent = `Всего карт: ${stats.totalCards}`;

  const rarityList = document.getElementById("stat-rarity-list");
  rarityList.innerHTML = "";
  const rarityOrder = rarityTiers.map((r) => r.name);
  Object.entries(stats.rarityCount)
    .sort((a, b) => rarityOrder.indexOf(a[0]) - rarityOrder.indexOf(b[0]))
    .forEach(([rarity, count]) => {
      const li = document.createElement("li");
      li.textContent = `${rarity}: ${count}`;
      rarityList.appendChild(li);
    });

  document.getElementById("stat-sent").textContent = `Отправлено: ${stats.sent.cards} карт, ${stats.sent.money}💰`;
  document.getElementById("stat-received").textContent = `Получено: ${stats.received.cards} карт, ${stats.received.money}💰`;
}

document.getElementById("promoType").addEventListener("change", function () {
  const container = document.getElementById("promoAmountContainer");
  if (this.value === "card") {
    if (cardsCache.length === 0) {
      container.innerHTML = "<p>Нет доступных карт</p>";
      return;
    }
    const select = document.createElement("select");
    select.id = "promoAmount";
    for (const card of cardsCache) {
      const option = document.createElement("option");
      option.value = card.id;
      option.textContent = `${card.name} (${card.rarity})`;
      select.appendChild(option);
    }
    container.innerHTML = "";
    container.appendChild(select);
  } else {
    container.innerHTML = `<input id="promoAmount" placeholder="Сумма или ID карты">`;
  }
});

/* =========================================================================
 * 5. Промокоды
 * ========================================================================= */
const SECRET = "i";
function encodePromo(payload) {
  return btoa(encodeURIComponent(JSON.stringify(payload) + "|" + SECRET));
}
function decodePromo(str) {
  try {
    const decoded = decodeURIComponent(atob(str));
    const [json, salt] = decoded.split("|");
    if (salt !== SECRET) throw new Error("bad salt");
    return JSON.parse(json);
  } catch {
    return null;
  }
}

async function usePromo() {
  const code = document.getElementById("promoInput").value;
  if (stats.usedPromo.includes(code)) return showMsg("promoMsg", "Уже использован");

  const data = decodePromo(code);
  if (!data) return showMsg("promoMsg", "Неверный код");

  if (data.money !== undefined) {
    setWallet(getWallet() + data.money);
    updateReceived("money", data.money);
    showMsg("promoMsg", `Получено ${data.money}💰`);
  } else if (data.cardId !== undefined) {
    const nameRarity = data.cardName?.match(/^(.*?) \((.*?)\)$/);
    const name = nameRarity?.[1] || "secret";
    const rarity = nameRarity?.[2] || "???";
    const blob = await fetchCatCardBlob(name, stats.username);
    const id = await Store.set(name, rarity, blob);
    cardsCache.push({ id, name, rarity, blob });
    recalcCardStatsFromCache();
    renderGallery();
    updateReceived("cards", 1);
    showMsg("promoMsg", `Получена карта "${name} (${rarity})"`);
  }

  stats.usedPromo.push(code);
  saveStats();
}

async function createPromo() {
  const type = document.getElementById("promoType").value;
  const to = document.getElementById("promoTo").value;
  const amountRaw = document.getElementById("promoAmount").value;
  if (!to) return showMsg("promoCreateMsg", "Укажите получателя");
  if (to === stats.username) return showMsg("promoCreateMsg", "Нельзя отправить промокод самому себе");

  const payload = { from: stats.username, to };
  let toastText;

  if (type === "money") {
    const amount = parseFloat(amountRaw);
    const wallet = getWallet();
    if (!(amount > 0) || wallet < amount) return showMsg("promoCreateMsg", "Недостаточно средств");
    setWallet(wallet - amount);
    updateSent("money", amount);
    payload.money = amount;
    toastText = `${amount}💰`;
  } else {
    const cardId = parseInt(amountRaw, 10);
    const idx = cardsCache.findIndex((c) => c.id === cardId);
    if (idx === -1) return showMsg("promoCreateMsg", "Карта не найдена");
    const card = cardsCache[idx];
    payload.cardId = cardId;
    payload.cardName = `${card.name} (${card.rarity})`;

    await Store.delete(cardId);
    cardsCache.splice(idx, 1);
    recalcCardStatsFromCache();
    renderGallery();
    updateSent("cards", 1);

    const select = document.getElementById("promoAmount");
    if (select && select.tagName === "SELECT") {
      const opt = select.querySelector(`option[value="${cardId}"]`);
      if (opt) opt.remove();
      if (select.options.length === 0) {
        document.getElementById("promoAmountContainer").innerHTML = "<p>Нет доступных карт</p>";
      }
    }
    toastText = `карту ${payload.cardName}`;
  }

  const code = encodePromo(payload);
  fetch(atob(BOT_SEND_URL), {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      chat_id: to,
      text: `Пользователь ${window.username} (${window.usid}) передает вам ${toastText}!\nПромокод:\n\`${code}\``,
      parse_mode: "Markdown",
    }),
  });

  showMsg("promoCreateMsg", "Промокод отправлен.");
}

function showMsg(el, txt) { document.getElementById(el).textContent = txt; }

/* =========================================================================
 * 6. Изображения котов — TheCatAPI (без промежуточного двойного фетча)
 * ========================================================================= */
const CAT_API_URL = "https://api.thecatapi.com/v1/images/search";
const CAT_API_KEY = "live_XrJ32KfwsZRBVHZgVgKFQ63PO2S1Uqpvl8trMP7LZX9q0e4yrHdPtzZD23y5C4es";
const FONT_FAMILY = "ProductSans";
const FONT_URL = "a/p.woff2"; // относительный путь вместо абсолютного

let fontReady = null;
function ensureFont() {
  // шрифт грузится максимум один раз за сессию, а не при каждой карточке
  if (!fontReady) {
    fontReady = new FontFace(FONT_FAMILY, `url(${FONT_URL})`)
      .load()
      .then((f) => document.fonts.add(f));
  }
  return fontReady;
}

// возвращает готовый Blob карточки (картинка + подпись владельца),
// без лишнего похода в сеть за уже готовыми байтами
async function fetchCatCardBlob(name, ownerLabel) {
  await ensureFont();

  const res = await fetch(CAT_API_URL, { headers: { "x-api-key": CAT_API_KEY } });
  const json = await res.json();
  const url = json[0]?.url || "https://cataas.com/cat";

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = url;
  await new Promise((resolve, reject) => {
    img.onload = resolve;
    img.onerror = reject;
  });

  const canvas = document.createElement("canvas");
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0);

  const fontSize = Math.floor(0.1 * img.height);
  ctx.font = `${fontSize}px '${FONT_FAMILY}'`;
  ctx.fillStyle = "#ffffff";
  ctx.textAlign = "center";
  ctx.textBaseline = "top";
  ctx.shadowColor = "black";
  ctx.shadowBlur = 4;
  ctx.fillText(ownerLabel, img.width / 2, img.height / 2);

  return new Promise((resolve) => canvas.toBlob((blob) => resolve(blob), "image/png"));
}

async function buyCard() {
  const btn = document.getElementById("b");
  btn.disabled = true;
  btn.innerText = "Ожидание...";

  const wallet = getWallet();
  if (wallet < 1000) { alert("Недостаточно валюты!"); btn.disabled = false; btn.innerText = "Взять карточку"; return; }

  const name = generateCatName();
  const rarity = getRarityInfo(hashNameToNumber(name, 1000));

  const blob = await fetchCatCardBlob(name, window.username);
  const id = await Store.set(name, rarity.name, blob);
  cardsCache.push({ id, name, rarity: rarity.name, blob });
  recalcCardStatsFromCache();

  setWallet(wallet - 1000);

  playCardAnimation(blob, name, rarity.name);
}

function playCardAnimation(blob, name, rarityName) {
  const objectUrl = URL.createObjectURL(blob);
  const output = document.getElementById("output");
  output.innerHTML = "";

  const card = document.createElement("div");
  card.className = "flip-card";
  const back = document.createElement("div");
  back.className = "card-back";
  const front = document.createElement("div");
  front.className = "card-front";
  const img = document.createElement("img");
  img.src = objectUrl;
  img.alt = name;
  back.style.background = rarityColors[rarityName];
  front.appendChild(img);
  card.appendChild(back);
  card.appendChild(front);
  output.appendChild(card);

  const caption = document.createElement("div");
  caption.className = "caption-hidden";
  caption.textContent = `${name} (${rarityName})`;
  output.appendChild(caption);

  img.onload = () => {
    document.getElementById("b").style.visibility = "hidden";
    const w = Math.min(img.naturalWidth, 300);
    const h = Math.min(img.naturalHeight, 300);
    [card, back, front, img].forEach((el) => { el.style.width = w + "px"; el.style.height = h + "px"; });

    setTimeout(() => {
      card.classList.add("flipped");
      setTimeout(() => {
        caption.style.opacity = 1;
        setTimeout(() => {
          card.style.transition = "1s ease-in-out";
          caption.style.transition = "1s ease-in-out";
          caption.style.opacity = 0;
          card.style.transform = "translate(-47vw, -54vh) scale(0.05)";
          card.style.opacity = 0;
          setTimeout(() => {
            card.remove();
            caption.remove();
            URL.revokeObjectURL(objectUrl);
            const btn = document.getElementById("b");
            btn.innerText = "Взять карточку";
            btn.disabled = false;
            btn.style.visibility = "visible";
          }, 1000);
        }, 1500);
      }, 800);
    }, 600);
  };
}

let galleryObjectUrls = [];
function renderGallery() {
  // рендерим из кэша в памяти — без обращения к IndexedDB
  galleryObjectUrls.forEach((u) => URL.revokeObjectURL(u));
  galleryObjectUrls = [];

  const container = document.getElementById("galleryContainer");
  container.innerHTML = "";

  for (const card of cardsCache) {
    const objectUrl = URL.createObjectURL(card.blob);
    galleryObjectUrls.push(objectUrl);

    const img = document.createElement("img");
    img.src = objectUrl;

    const caption = document.createElement("div");
    caption.innerHTML = `${card.name}<br>${card.rarity}`;
    caption.className = "caption";
    caption.style.color = "black";

    const cell = document.createElement("div");
    cell.className = "gallery-card";
    cell.style.background = rarityColors[card.rarity];
    cell.appendChild(img);
    cell.appendChild(caption);
    cell.onclick = async () => {
      if (!confirm(`Продать ${card.name} (${card.rarity})?`)) return;
      await Store.delete(card.id);
      cardsCache = cardsCache.filter((c) => c.id !== card.id);
      const tier = rarityTiers.find((t) => t.name === card.rarity);
      setWallet(getWallet() + (tier?.sell || 0));
      recalcCardStatsFromCache();
      renderGallery();
    };
    container.appendChild(cell);
  }
}
